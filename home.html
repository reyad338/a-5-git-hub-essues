<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Page</title>
  <!-- daisy ui and tailwind -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- google font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet">
  <!-- css add -->
  <link rel="stylesheet" href="s.css">
  <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

  <!-- FONT CDN-->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>


<body>
  <header>
    <div class="navbar bg-[#ffffff] border border-[#E9E9E9] shadow-sm flex justify-between mb-10">
      <div class="flex gap-3 justify-between">
        <img class="w-[58px] h-[55px] flex justify-center items-center" src="./assets/github-logo.png" alt="">
        <p class="flex items-center justify-center font-semibold">GitHub Issues Tracker</p>
      </div>
      <div class="flex gap-2">
        <div class="relative w-64">
          <!-- <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i> -->
          <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/3  text-black"></i>
          <input type="text" placeholder="Search Issues..." class="border rounded-md pl-10 py-2 w-full">
        </div>

        <button class="btn btn-primary text-white">+New Essues</button>
      </div>
    </div>
  </header>
  <!-- 3 button -->
  <div class="w-[1340px] mx-auto  p-3 border border-[#E9E9E9] shadow-sm flex rounded-md mb-4 ">
    <div>
      <button class=" btn btn-outline btn-primary">All</button>
      <button class="btn btn-outline btn-primary">Open</button>
      <button class="btn btn-outline btn-primary">Closed</button>
    </div>
  </div>

  <!-- main container -->


  <section class="w-[1340px] mx-auto border border-white p-4 bg-white shadow-md rounded-md ">
    <div class="flex justify-between ">

      <div class="flex gap-4">

        <div>
          <div>
            <img class="bg-[#ECE4FF] p-2 rounded-full" src="./assets/Aperture.png" alt="">
          </div>
        </div>

        <div>
          <h2 class="font-semibold text-xl">50 Issues</h2>
          <p class="font-light text-[#64748B]">Track and manage your project issues</p>
        </div>

      </div>


      <div class="flex justify-center items-center gap-3">
        <span class="bg-[#00A96E] rounded-full w-[15px] h-[15px]"> </span>
        <p>Open</p>
        <span class="bg-[#A855F7] rounded-full w-[15px] h-[15px]"> </span>
        <p>Closed</p>
      </div>
    </div>

  </section>

  <!-- all card -->
  <section>
    <div id="all-issu">

    </div>
  </section>

</body>



</html>
