<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Page</title>
  <!-- daisy ui and tailwind -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- google font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet">
  <!-- css add -->
  <link rel="stylesheet" href="s.css">
  <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

  <!-- FONT CDN-->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body class="bg-gray-200">
  <!-- navbar -->
  <div class="bg-white px-10 shadow flex justify-between">
    <div class="flex items-center">
      <img class="w-[58px] h-[56px] p-2" src="./assets/github-logo.png" alt="">
      <p class="font-bold text-lg text-[#1F2937]">GitHub Issues Tracker</p>
    </div>
    <div class="flex items-center gap-1">
      <input onkeyup="searchIssue(this.value)" class="border rounded p-2" type="text" placeholder="Search issues....">
      <button class="btn btn-primary">+ New Issue</button>
    </div>
  </div>

  <!-- tav btn -->
  <div class="w-11/12 mx-auto ">
    <div class="bg-white  p-5 rounded-lg mt-4">
      <button onclick="switchTab('all')" id="tab-all" class="btn btn-outline btn-primary">All</button>
      <button onclick="switchTab('open')" id="tab-open" class="btn btn-outline btn-primary">Open</button>
      <button onclick="switchTab('closed')" id="tab-closed" class="btn btn-outline btn-primary">Closed</button>
    </div>
  </div>

  <!-- issu card 50 -->
  <div class="w-11/12 mx-auto mt-6 flex justify-between rounded-md bg-white  p-4 shadow-md">

    <div class="flex items-center gap-3">
      <img src="/assets/Aperture.png" alt="">
      <div>
        <h2><span id="issue-count">0</span> Issues</h2>
        <p class="text-gray-500">Track and manage your project issues</p>
      </div>
    </div>


    <div class="flex gap-6">
      <div class="flex items-center gap-1">
        <span class="w-3 h-3 bg-green-500 rounded-full"></span>Open
      </div>
      <div class="flex items-center gap-1">
        <span class="w-3 h-3 bg-purple-500 rounded-full"></span>Open
      </div>

    </div>


  </div>

  <!-- spiners -->
  <div id="loader" class="text-center mt-10 hidden">
    <span class="loading loading-bars loading-xl"></span>
  </div>
  <!-- card grids -->
  <div id="issue-container" class="max-w-7xl mx-auto mt-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
  </div>

  <!-- modal -->

  <dialog id="issueModal" class="modal modal-bottom sm:modal-middle">
    <div class="modal-box">
      <h3 id="modal-title" class="font-bold text-lg"></h3>
      <p id="modal-description" class="py-3"></p>
      <div id="modal-info" class="space-y-2 text-sm"></div>
      <div class="modal-action">
        <form method="dialog">
          <button class="btn">Close</button>
        </form>
      </div>
    </div>
  </dialog>


  <script src="home.js"></script>
</body>



</html>
